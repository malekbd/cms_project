name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: cms_project.settings
        run: |
          python manage.py test

      - name: Lint (optional)
        if: always()
        run: |
          python -m pip install --upgrade ruff  || true
          ruff --version || true
          # Optional lint pass; uncomment below if you want to enforce linting in CI
          # ruff check .
