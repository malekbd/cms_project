name: CI - Test, Lint, and Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly security scan

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev gcc python3-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt 2>/dev/null || echo "No dev requirements found"

    - name: Create .env file for testing
      run: |
        cat > .env << EOF
        DEBUG=True
        SECRET_KEY=test-secret-key-for-ci-$(openssl rand -hex 32)
        ALLOWED_HOSTS=localhost,127.0.0.1,testserver
        DATABASE_URL=sqlite:///db.sqlite3
        REDIS_URL=redis://localhost:6379/0
        EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
        SECURE_SSL_REDIRECT=False
        SESSION_COOKIE_SECURE=False
        CSRF_COOKIE_SECURE=False
        EOF

    - name: Run database migrations
      run: |
        python manage.py migrate --noinput

    - name: Run Django tests
      run: |
        python manage.py test --parallel=2 --verbosity=2

    - name: Run coverage
      run: |
        pip install coverage
        coverage run --source='.' manage.py test
        coverage xml
        coverage report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install flake8 black isort bandit safety pylint django-stubs mypy

    - name: Check code formatting with black
      run: |
        black --check --diff .

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .

    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run pylint
      run: |
        pylint --rcfile=.pylintrc cms_project tickets 2>/dev/null || echo "Pylint completed"

    - name: Run mypy for type checking
      run: |
        mypy --ignore-missing-imports cms_project tickets

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        pip install bandit safety django-security-check

    - name: Run bandit security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true

    - name: Check for vulnerable dependencies with safety
      run: |
        safety check --json --output safety-report.json || true

    - name: Run Django security check
      run: |
        python manage.py check --deploy --fail-level WARNING 2>/dev/null || echo "Security check completed"

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Build static files
      run: |
        python manage.py collectstatic --noinput --clear

    - name: Create deployment package
      run: |
        mkdir -p dist
        tar -czf dist/deployment-$(date +%Y%m%d-%H%M%S).tar.gz \
          --exclude=.git \
          --exclude=__pycache__ \
          --exclude=*.pyc \
          --exclude=*.pyo \
          --exclude=dist \
          --exclude=.github \
          .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: dist/

  notify:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: always()
    
    steps:
    - name: Check workflow status
      run: |
        echo "Test job status: ${{ needs.test.result }}"
        echo "Lint job status: ${{ needs.lint.result }}"
        echo "Security job status: ${{ needs.security.result }}"